<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed": "#410001",
                    "surface-bright": "#f8f9ff",
                    "outline-variant": "#dec0bb",
                    "tertiary-fixed-dim": "#c4c7c9",
                    "tertiary-container": "#484b4d",
                    "primary-fixed": "#ffdad5",
                    "surface": "#f8f9ff",
                    "on-tertiary-fixed-variant": "#444749",
                    "on-background": "#0b1c30",
                    "inverse-surface": "#213145",
                    "on-tertiary-fixed": "#191c1e",
                    "on-surface": "#0b1c30",
                    "surface-variant": "#d3e4fe",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#a7382d",
                    "secondary": "#545f73",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#57423e",
                    "on-primary-container": "#ffa396",
                    "on-secondary-fixed-variant": "#3c475a",
                    "on-primary": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed": "#111c2d",
                    "inverse-primary": "#ffb4a9",
                    "secondary-fixed-dim": "#bcc7de",
                    "background": "#f8f9ff",
                    "surface-dim": "#cbdbf5",
                    "outline": "#8b716d",
                    "inverse-on-surface": "#eaf1ff",
                    "on-secondary-container": "#586377",
                    "primary-container": "#8c251c",
                    "secondary-container": "#d5e0f8",
                    "tertiary-fixed": "#e0e3e5",
                    "primary": "#6c0c08",
                    "secondary-fixed": "#d8e3fb",
                    "on-error-container": "#93000a",
                    "error": "#ba1a1a",
                    "surface-container-highest": "#d3e4fe",
                    "surface-container": "#e5eeff",
                    "tertiary": "#313536",
                    "surface-container-low": "#eff4ff",
                    "surface-container-high": "#dce9ff",
                    "primary-fixed-dim": "#ffb4a9",
                    "on-error": "#ffffff",
                    "on-tertiary-container": "#b8bbbd",
                    "on-tertiary": "#ffffff",
                    "on-primary-fixed-variant": "#862118"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "section-gap": "2rem",
                    "gutter": "1rem",
                    "stack-sm": "0.5rem",
                    "stack-md": "1rem",
                    "stack-lg": "1.5rem",
                    "margin-mobile": "1rem"
            },
            "fontFamily": {
                    "title-lg": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "display-lg": ["Manrope"],
                    "body-sm": ["Manrope"],
                    "label-lg": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "body-md": ["Manrope"]
            },
            "fontSize": {
                    "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.1px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Manrope', sans-serif; }
        .bottom-sheet-overlay { backdrop-filter: blur(12px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface overflow-hidden">
<!-- Background Content (Dashboard Preview) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-white border-b border-slate-200 shadow-sm">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-white text-xs font-bold">AP</div>
<h1 class="font-['Manrope'] font-semibold text-lg text-red-900">Primakov Admin</h1>
</div>
<span class="material-symbols-outlined text-slate-500">notifications</span>
</header>
<main class="pt-20 px-4">
<div class="flex justify-between items-center mb-6">
<h2 class="font-display-lg text-display-lg text-on-background">User Management</h2>
</div>
<div class="grid grid-cols-1 gap-4 opacity-30 pointer-events-none">
<div class="p-4 bg-white border border-slate-200 rounded-xl shadow-sm flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-slate-100"></div>
<div class="flex-1">
<div class="h-4 w-32 bg-slate-200 rounded mb-2"></div>
<div class="h-3 w-20 bg-slate-100 rounded"></div>
</div>
</div>
<div class="p-4 bg-white border border-slate-200 rounded-xl shadow-sm flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-slate-100"></div>
<div class="flex-1">
<div class="h-4 w-40 bg-slate-200 rounded mb-2"></div>
<div class="h-3 w-24 bg-slate-100 rounded"></div>
</div>
</div>
</div>
</main>
<!-- Bottom Sheet Modal Container -->
<div class="fixed inset-0 z-[100] flex flex-col justify-end bg-black/40 bottom-sheet-overlay">
<!-- Pull Indicator (Visual only for mobile context) -->
<div class="flex justify-center mb-2">
<div class="w-10 h-1.5 bg-white/50 rounded-full"></div>
</div>
<!-- The Modal/Bottom Sheet Content -->
<div class="bg-surface-container-lowest rounded-t-[32px] w-full h-[813px] flex flex-col shadow-2xl overflow-hidden">
<!-- Modal Header -->
<div class="px-6 py-5 flex items-center justify-between border-b border-outline-variant/30">
<div class="flex flex-col">
<h3 class="font-headline-md text-headline-md text-on-background">Add New User</h3>
<p class="font-body-sm text-body-sm text-secondary">Register a new student, teacher, or staff member.</p>
</div>
<button class="p-2 hover:bg-surface-variant rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<!-- Form Content (Scrollable) -->
<div class="flex-1 overflow-y-auto px-6 py-6 space-y-6">
<!-- Profile Image Upload Placeholder -->
<div class="flex flex-col items-center gap-4 py-4">
<div class="relative group">
<div class="w-24 h-24 rounded-full bg-surface-container-high border-2 border-dashed border-outline flex flex-col items-center justify-center text-outline overflow-hidden">
<span class="material-symbols-outlined text-3xl">add_a_photo</span>
<span class="font-label-sm text-label-sm mt-1">Upload</span>
</div>
<div class="absolute -bottom-1 -right-1 bg-primary text-white p-1.5 rounded-full border-2 border-surface-container-lowest">
<span class="material-symbols-outlined text-sm">edit</span>
</div>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- First Name -->
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1" for="first_name">First Name</label>
<input class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="first_name" placeholder="e.g. Alexander" type="text"/>
</div>
<!-- Last Name -->
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1" for="last_name">Last Name</label>
<input class="w-full h-12 px-4 rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="last_name" placeholder="e.g. Primakov" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1" for="email">Academic Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full h-12 pl-12 pr-4 rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="email" placeholder="a.primakov@school.edu" type="email"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Role Dropdown -->
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1" for="role">Administrative Role</label>
<div class="relative">
<select class="w-full h-12 px-4 appearance-none rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" id="role">
<option disabled="" selected="" value="">Select Role</option>
<option value="student">Student</option>
<option value="teacher">Teacher</option>
<option value="admin">Administrator</option>
<option value="staff">Staff</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">expand_more</span>
</div>
</div>
<!-- Class/Group -->
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1" for="group">Class / Group</label>
<div class="relative">
<select class="w-full h-12 px-4 appearance-none rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" id="group">
<option disabled="" selected="" value="">Assign Group</option>
<option value="10a">Grade 10-A</option>
<option value="11b">Grade 11-B</option>
<option value="faculty">Science Faculty</option>
<option value="admin_staff">Admin Office</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">school</span>
</div>
</div>
</div>
<!-- Password -->
<div class="space-y-1.5">
<label class="font-label-lg text-label-lg text-on-surface ml-1" for="password">Temporary Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full h-12 pl-12 pr-12 rounded-xl border border-outline-variant bg-white focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" id="password" type="password" value="********"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<p class="font-body-sm text-[11px] text-secondary px-1">User will be required to change this upon first login.</p>
</div>
<!-- Permissions Toggle Placeholder -->
<div class="p-4 bg-surface-container-low rounded-2xl flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="bg-white p-2 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-primary">verified_user</span>
</div>
<div>
<p class="font-label-lg text-label-lg text-on-background">System Access</p>
<p class="font-body-sm text-[11px] text-secondary">Enable access to admin dashboard</p>
</div>
</div>
<div class="w-12 h-6 bg-primary rounded-full relative flex items-center px-1">
<div class="w-4 h-4 bg-white rounded-full translate-x-6"></div>
</div>
</div>
</div>
<!-- Sticky Bottom Actions -->
<div class="p-6 border-t border-outline-variant/30 bg-surface-container-lowest flex items-center gap-3">
<button class="flex-1 h-12 rounded-xl border border-outline text-on-surface font-label-lg hover:bg-surface-variant transition-colors flex items-center justify-center gap-2">
                    Cancel
                </button>
<button class="flex-1 h-12 rounded-xl bg-primary text-white font-label-lg shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-95 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 1;">save</span>
                    Save User
                </button>
</div>
</div>
</div>
<!-- Background Navigation Suppression as per Shell Rules (Inactive but present in HTML context) -->
<nav class="hidden md:flex fixed top-0 h-full w-80 z-[60] p-4 bg-white shadow-2xl border-r border-slate-200 pointer-events-none opacity-20">
<div class="w-full h-full flex flex-col gap-4">
<div class="flex items-center gap-3 p-4">
<div class="w-10 h-10 rounded-xl bg-primary"></div>
<div class="h-4 w-32 bg-slate-200 rounded"></div>
</div>
<div class="flex-1 space-y-2">
<div class="h-10 w-full bg-red-50 rounded-lg"></div>
<div class="h-10 w-full bg-slate-50 rounded-lg"></div>
<div class="h-10 w-full bg-slate-50 rounded-lg"></div>
</div>
</div>
</nav>
</body></html>
